name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extracted_applet/package-lock.json

      - name: Install Dependencies
        run: |
          cd extracted_applet
          npm install

      - name: Build Web App
        run: |
          cd extracted_applet
          npm run build

      - name: Sync Capacitor
        run: |
          cd extracted_applet
          npx cap sync android

      - name: Build Android APK
        run: |
          cd extracted_applet/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Kristel-Genius-Hub-Debug-APK
          path: extracted_applet/android/app/build/outputs/apk/debug/app-debug.apk
