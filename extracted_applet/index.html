<head>

    <title>Kristel's Genius Hub with The Clairvoyant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
      /* Animation for The Clairvoyant's messages */
      @keyframes clairvoyantMessageAnimation {
        from {
          opacity: 0;
          transform: translateY(15px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-clairvoyant-message {
        animation: clairvoyantMessageAnimation 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      }
    </style>
